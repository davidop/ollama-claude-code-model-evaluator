name: Validate

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Syntax check
        run: python -m py_compile eval_ollama_models.py

      - name: CLI help check
        run: python eval_ollama_models.py --help

      - name: Validate benchmark JSON files
        run: python scripts/validate-benchmark-json.py

      - name: Validate README local links
        run: python scripts/validate-markdown-links.py
